name: release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the app,
# attach flow-bar.zip to a GitHub release, and update the Homebrew cask.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift run flowbar-tests

      # Sign every release with ONE persistent self-signed cert so the app's
      # Designated Requirement stays constant across versions — that's what lets
      # macOS keep Accessibility/Automation grants after an upgrade (ad-hoc's
      # identity changes each build, so TCC drops the grant every time).
      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          CERT_PEM: ${{ secrets.MACOS_CERT_PEM }}
        run: |
          set -euo pipefail
          P12="$RUNNER_TEMP/signing.p12"
          PEM="$RUNNER_TEMP/signing.pem"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KC_PASS="ci-signing-pass"
          echo "$CERT_P12" | base64 --decode > "$P12"
          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KEYCHAIN" >/dev/null
          # keep login keychain in the search list too
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          # a self-signed cert must be TRUSTED for code signing to be a *valid*
          # identity (otherwise codesign silently falls back to ad-hoc).
          echo "$CERT_PEM" | base64 --decode > "$PEM"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain "$PEM"
          security find-identity -v -p codesigning "$KEYCHAIN"
          echo "CODESIGN_IDENTITY=flow-bar-signing" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: ./build-app.sh

      - name: Verify signature
        run: |
          codesign -dvv flow-bar.app 2>&1 | grep -iE 'Authority|Identifier=' || true
          echo "--- designated requirement (TCC keys on this) ---"
          codesign -d -r- flow-bar.app 2>&1 | tail -1
          if ! codesign -dvv flow-bar.app 2>&1 | grep -q 'Authority=flow-bar-signing'; then
            echo "::error::app is NOT signed with flow-bar-signing — would drop TCC grants on upgrade"
            exit 1
          fi

      - name: Zip the app
        run: ditto -c -k --keepParent flow-bar.app flow-bar.zip

      - name: Compute checksum
        id: sum
        run: echo "sha256=$(shasum -a 256 flow-bar.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${{ steps.sum.outputs.sha256 }}"
          sed -i '' -E "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/flow-bar.rb
          sed -i '' -E "s/sha256 .*/sha256 \"${SHA}\"/" Casks/flow-bar.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/flow-bar.rb
          git commit -m "cask: ${GITHUB_REF_NAME} (${SHA})" || echo "no cask change"
          git push origin HEAD:main || echo "push skipped"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: flow-bar.zip
          generate_release_notes: true
